<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Tika Law Chat Widget Test</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, "Noto Sans Hebrew", sans-serif;
        background: #eef2ec;
        color: #17202a;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(135deg, rgb(255 255 255 / 84%), rgb(238 242 236 / 88%)),
          url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1600&q=70");
        background-size: cover;
        background-position: center;
      }

      main {
        width: min(92vw, 720px);
        padding: 56px 28px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(32px, 6vw, 56px);
      }

      p {
        margin: 0 0 22px;
        max-width: 560px;
        line-height: 1.6;
      }

      .controls {
        width: min(100%, 520px);
        display: grid;
        gap: 10px;
        padding: 16px;
        border-radius: 8px;
        background: rgb(255 255 255 / 88%);
        border: 1px solid #d9e0e8;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 14px;
        font-weight: 700;
      }

      input {
        border: 1px solid #cfd6df;
        border-radius: 6px;
        padding: 10px 12px;
        font: inherit;
      }

      @media (max-width: 640px) {
        html, body {
          overflow-x: hidden;
        }
        main {
          padding: 24px 16px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Tika Law</h1>
      <p>
        דף בדיקה לווידג׳ט הצף. לחצו על הכפתור הכחול בתחתית המסך כדי להתחיל שיחה עם המזכירה הדיגיטלית.
      </p>

      <div class="controls">
        <label>
          כתובת API
          <input id="apiBaseUrl" />
        </label>
        <label>
          מזהה עורך דין
          <input id="attorneyId" value="demo-attorney" />
        </label>
      </div>

      <div id="tika-law-widget"></div>
    </main>

    <script>
      var defaultApiBaseUrl =
        window.location.hostname === "localhost" && window.location.port === "5173"
          ? "http://localhost:8000"
          : window.location.origin;
      var widgetScript =
        window.location.hostname === "localhost" && window.location.port === "5173"
          ? "./widget.js"
          : "/widget/widget.js";

      document.querySelector("#apiBaseUrl").value = defaultApiBaseUrl;

      function mountWidget() {
        window.TikaLaw.init({
          mount: "#tika-law-widget",
          apiBaseUrl: document.querySelector("#apiBaseUrl").value,
          attorneyId: document.querySelector("#attorneyId").value,
        });
      }

      var script = document.createElement("script");
      script.src = widgetScript;
      script.onload = mountWidget;
      document.body.appendChild(script);

      document.querySelector("#apiBaseUrl").addEventListener("change", mountWidget);
      document.querySelector("#attorneyId").addEventListener("change", mountWidget);
    </script>
  </body>
</html>
